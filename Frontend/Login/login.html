<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Rush</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ruda:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../normalize.css">
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="./login.css">
</head>
<body>

    <main class="login__main">
      <section class="login">
        <div class="conteyner login__wraper">
            <img width="350" src="../../photo/icon/logo.png" alt="" class="login_logo">
            <form class="login__form">
                <div class="login__content">
                    <label for="login-email" class="login_label">your email:</label>
                    <input id="login-email" type="text" class="login_input" placeholder="change your email">
                </div>
                <div class="login__content">
                    <label for="login-password" class="login_label">your password:</label>
                    <input id='login-password' type="text" class="login_input" placeholder="change your password">
                </div>
                <button class="login_btn">login</button>
                <small class="login_small">If you don't have accaunt will you need registor</small>
            </form>
        </div>
      </section>
      <section class="section-loading">
        <div class="loading">

        </div>
      </section>
    </main>

    <script type="module" src="../firebase.js"></script>
    <script src="./login.js"></script>
</body>
</html>
