<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Rush</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ruda:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../normalize.css">
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="./shop.css">
</head>
<body>

    <header class="site__header">
        <div class="conteyner header__wraper">  
            <div class="header__logo">
                <img width="110" src="../../photo/icon/logo.png" alt="" class="header_logo">
                <div class="header__content">
                    <h3 class="header_title">SKILL RUSH</h3>
                    <small class="header_small">Everyone have skill</small>
                </div>
            </div>
            <nav class="header__navbar">
                <ul class="navbar__list">
                    <li class="navbar_item"><a href="../Home/home.html" class="navbar_link">Home</a><span class="navbar__bottom"></span></li>
                    <li class="navbar_item"><a href="../Game/game.html" class="navbar_link">Game</a><span class="navbar__bottom"></span></li>
                    <li class="navbar_item"><a href="../Shop/shop.html" class="navbar_link">Shop</a><span class="navbar__bottom"></span></li>
                    <li class="navbar_item"><a href="../Leader/leader.html" class="navbar_link">Leader</a><span class="navbar__bottom"></span></li>
                    <li class="navbar_item"><a href="../Create/create.html" class="navbar_link">Create</a><span class="navbar__bottom"></span></li>
                </ul>
            </nav>
            <div class="header__left">
                <div class="header__profile">
                    <img width="56" src="" alt="" class="header_avatar">
                    <div class="header__content">
                        <h4 class="header_name"></h4>
                        <small class="header_email"></small>
                    </div> 
                </div>
                <div class="header__score">
                    <small class="header_small">Your score:</small>
                    <h5 class="header_subtitle score"></h5>
                </div>
                <div class="header__ball">
                    <small class="header_small">Your ball:</small>
                    <h5 class="header_subtitle ball"></h5>
                </div>
            </div>
        </div>
    </header> 
    <main class="site__main">
        <section class="search">
            <div class="conteyner search__wraper">
                <h2 class="search_title">Search avatar</h2>
                <form class="search__form">
                    <input id="name" type="number" class="search_input" placeholder="change score avatars...">
                    <button class="search_btn">Search</button>
                </form>
            </div>
        </section>
        <section class="shop">
            <div class="conteyner shop__wraper">
                <h2 class="shop_title">Every avatars</h2>
                <ul class="shop__list"></ul>
            </div>
        </section>
        <section class="buy">
            <div class="conteyner buy__wraper">
                <div class="buy__content">
                  <h2 class="buy_title">Do you want to buy this avatar?</h2>
                  <img src="" alt="" class="buy_img">
                  <div class="buy__btn">
                    <button class="buy_btn-yes">Yes</button>
                    <button class="buy_btn-no">No</button>
                  </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="../firebase.js"></script>
    <script src="./shop.js"></script>
</body>
</html>
